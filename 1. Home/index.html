<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Home | The Vortex</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="headerr">
        <div class="logo-container">
            <h1 class="Logo">The Nexus</h1>
        </div>
        <div class="nav-container">
            <nav>
                <div class="nav-links">
                    <a href="#">Home</a>
                    <a href="#">Research</a>
                    <a href="#">Portfolio</a>
                    <a href="#">Notebook</a>
                    <a href="#">The List</a>
                    <button id="theme-toggle" class="theme-btn">🌓</button>
                </div>
            </nav>
        </div>
    </div>


    <main>
        <section id="pg1">

            <div class="column col-left">
                <div class="intro-text glass-panel">
                    <img src="" alt="">
                    <h3>Hi, I'm Aditya</h3>
                    <p>I'm a cs undergraduate student who is super into theoretical physics, astrophysics,
                        cosmology and the complimentary geek shit that comes with it.</p>
                </div>
            </div>


            <div class="column col-middle">
                <div class="bullitin">
                    <h2>[bulletin board]</h2>
                    <div class="bulletin-controls">
                        <input type="text" id="search-input" placeholder="Search notes...">
                        <div class="filter-sort-controls">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="update">Updates</button>
                            <button class="filter-btn" data-filter="misc">Misc</button>
                            <button id="sort-btn">Sort: Newest</button>
                        </div>
                    </div>
                    <div class="bulletin-items" id="dynamic-bulletin">

                    </div>
                </div>
                <div class="visionboard glass-panel">
                    <h2>/visionboarddd</h2>
                    <img src="../0. Archive/_ (2).jpeg" alt="Vision Board" style="width: 100%; border-radius: 10px;">
                </div>
            </div>


            <div class="column col-right">
                <div class="spotify">
                    <iframe
                        src="https://open.spotify.com/embed/playlist/7Ln6jCiJDZhhxecpmBpAyT?utm_source=generator&theme=0"
                        width="100%" height="380" frameborder="0"
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                    </iframe>
                </div>

                <div class="last-section glass-panel">
                    <div class="apod">
                        <h1>🌌 Astronomy Picture of the Day</h1>
                        <div class="card">
                            <h2 id="title"></h2>
                            <p id="date"></p>
                            <img id="apod-image" src="" alt="APOD Image">
                            <p id="description"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="index.js"></script>
</body>

</html>
