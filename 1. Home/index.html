<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Home | The Vortex</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>



    <div class="headerr">
        <div class="logo-container">
            <h1 class="Logo">The Vortex</h1>
        </div>
        <div class="nav-container">
            <nav>
                <div class="nav-links">
                    <a href="#">Home</a>
                    <a href="#">Projects</a>
                    <a href="#">Portfolio</a>
                    <a href="#">Notebook</a>
                    <a href="#">The List</a>
                </div>
            </nav>
        </div>
    </div>

    <!-- main sec -->
    <main>
        <section id="pg1">

            <div class="column col-left">
                <div class="intro-text glass-panel">
                    <img src="" alt="">
                    <h3>Hi, I'm Aditya Singh</h3>
                    <p>I'm a cs undergraduate student who is super into finance and space</p>
                </div>
            </div>


            <div class="column col-middle">
                <div class="bullitin">
                    <h2>[bulletin board]</h2>
                    <div class="bulletin-items">
                        <div class="sticky-note">
                            <p>undercover out now</p>
                        </div>
                        <div class="sticky-note lines">
                            <p>stream limn plslsls **.*</p>
                        </div>
                        <div class="sticky-note">
                            <p>misc pages :p</p>
                        </div>
                    </div>
                </div>
                <div class="visionboard glass-panel">
                    <h2>/microblog</h2>

                    <img src="../0. Archive/_ (2).jpeg" alt="Vision Board" style="width: 100%; border-radius: 10px;">
                </div>
            </div>


            <div class="column col-right">
                <div class="spotify">
                    <iframe src="https://open.spotify.com/playlist/7Ln6jCiJDZhhxecpmBpAyT?si=f3f8b670bbdf449b"
                        width="100%" height="380" frameborder="0"
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                    </iframe>
                </div>

                <div class="last-section glass-panel">
                    <div class="apod">
                        <h1>🌌 Astronomy Picture of the Day</h1>
                        <div class="card">
                            <h2 id="title"></h2>
                            <p id="date"></p>
                            <img id="apod-image" src="" alt="APOD Image">
                            <p id="description"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script src="index.js"></script>
